<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Presensi PKL SMKN 1 Pajangan</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: auto; padding: 20px; text-align: center; }
        video, canvas { width: 100%; max-width: 300px; border-radius: 8px; margin-bottom: 5px; }
        input, select, button { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
        #canvas { display: none; }
        #info-lokasi { font-weight: bold; margin-bottom: 15px; color: blue; }
        .sukses { color: green; font-weight: bold; }
        .gagal { color: red; font-weight: bold; }
        .peringatan { color: orange; font-size: 0.9em; font-weight: bold; margin-bottom:10px; display:none; }
        
        /* Gaya khusus untuk tombol putar kamera agar beda dengan tombol absen */
        #btn-kamera { 
            background-color: #f0f0f0; 
            border: 1px solid #ccc; 
            color: #333; 
            margin-bottom: 15px; 
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>Presensi PKL</h2>
    
    <select id="guru" required>
        <option value="">-- Pilih Guru Pembimbing --</option>
        <option value="guruA">Bapak Udin</option>
        <option value="guruB">Ibu Sumiharyati</option>
        <option value="guruC">Bapak SUgiharjono</option>
    </select>

    <input type="number" id="nis" placeholder="Masukkan NIS" required>
    <input type="text" id="nama" placeholder="Masukkan Nama Lengkap" required>
    
    <select id="status">
        <option value="Datang">Datang</option>
        <option value="Pulang">Pulang</option>
        <option value="Sakit">Sakit</option>
        <option value="Izin">Izin</option>
    </select>

    <div id="pesan-izin" class="peringatan">Info: Mode Sakit/Izin aktif. Gunakan kamera belakang untuk memotret Surat Bukti!</div>

    <video id="video" autoplay playsinline></video>
    
    <!-- TAMBAHAN: Tombol Putar Kamera -->
    <button id="btn-kamera" type="button">🔄 Putar Kamera Depan/Belakang</button>

    <canvas id="canvas"></canvas>

    <div id="info-lokasi">Mencari lokasi GPS...</div>

    <button id="btn-foto" disabled>Ambil Foto & Kirim</button>
    <p id="status-pesan"></p>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const infoLokasi = document.getElementById('info-lokasi');
        const btnFoto = document.getElementById('btn-foto');
        const btnKamera = document.getElementById('btn-kamera');
        const statusPesan = document.getElementById('status-pesan');
        const menuStatus = document.getElementById('status');
        const pesanIzin = document.getElementById('pesan-izin');
        
        let kordinatSaatIni = null;
        let pakaiKameraDepan = true; // Variabel penyimpan status kamera saat ini

        // 1. DATABASE URL GURU
        const daftarURLGuru = {
            "guruA": "https://script.google.com/macros/s/AKfycbyGrr3BtWhE4bDELj3V6jrmNpV2gWX79YZepdpc4262lR5FrrFns5Rrb-3HWY69_FKbxg/exec",
            "guruB": "https://script.google.com/macros/s/URL_MILIK_IBU_BUDI_DISINI/exec"
        };

        // Event Listener untuk memunculkan pesan jika memilih Sakit/Izin
        menuStatus.addEventListener('change', () => {
            if(menuStatus.value === "Sakit" || menuStatus.value === "Izin") {
                pesanIzin.style.display = "block";
                infoLokasi.style.display = "none"; 
            } else {
                pesanIzin.style.display = "none";
                infoLokasi.style.display = "block";
            }
        });

        // 2. FUNGSI BARU: Menyalakan dan Memutar Kamera
        function mulaiKamera() {
            // Matikan kamera yang sedang menyala (jika ada) sebelum mengganti
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }

            // Tentukan mode: "user" (depan) atau "environment" (belakang)
            const modeKamera = pakaiKameraDepan ? "user" : "environment";

            navigator.mediaDevices.getUserMedia({ video: { facingMode: modeKamera } })
                .then(stream => { video.srcObject = stream; })
                .catch(err => { infoLokasi.innerHTML = "<span class='gagal'>Kamera tidak diizinkan atau tidak didukung!</span>"; });
        }

        // Jalankan kamera saat halaman web pertama kali dibuka
        mulaiKamera();

        // Event Listener saat tombol "Putar Kamera" ditekan
        btnKamera.addEventListener('click', () => {
            pakaiKameraDepan = !pakaiKameraDepan; // Balikkan nilainya (True ke False, dst)
            mulaiKamera(); // Nyalakan ulang kamera dengan mode baru
        });

        // 3. Kunci Lokasi
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(
                (position) => {
                    kordinatSaatIni = `${position.coords.latitude}, ${position.coords.longitude}`;
                    infoLokasi.innerText = "Lokasi ditemukan! Siap presensi.";
                    btnFoto.disabled = false;
                },
                (error) => { infoLokasi.innerHTML = "<span class='gagal'>Gagal mendapatkan lokasi. Aktifkan GPS HP!</span>"; btnFoto.disabled = true; },
                { enableHighAccuracy: true }
            );
        }

        // 4. Kirim Data
        btnFoto.addEventListener('click', () => {
            const guruDipilih = document.getElementById('guru').value;
            const nis = document.getElementById('nis').value;
            const nama = document.getElementById('nama').value;
            const status = menuStatus.value;

            if(!guruDipilih) { alert("Silakan pilih Guru Pembimbing terlebih dahulu!"); return; }
            if(!nis || !nama) { alert("NIS dan Nama harus diisi!"); return; }

            statusPesan.innerHTML = "<span style='color:blue;'>Memproses data...</span>";
            btnFoto.disabled = true;

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const fotoBase64 = canvas.toDataURL('image/jpeg', 0.8);

            const scriptURL = daftarURLGuru[guruDipilih];

            const payload = {
                nis: nis,
                nama: nama,
                status: status,
                lokasi: kordinatSaatIni,
                foto: fotoBase64
            };

            fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify(payload),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            })
            .then(response => response.json())
            .then(data => {
                if(data.result === "success") {
                    statusPesan.innerHTML = "<span class='sukses'>Presensi Berhasil Diterima!</span>";
                } else {
                    statusPesan.innerHTML = `<span class='gagal'>${data.message}</span>`;
                }
                btnFoto.disabled = false;
            })
            .catch(error => {
                statusPesan.innerHTML = "<span class='gagal'>Terjadi kesalahan koneksi internet.</span>";
                btnFoto.disabled = false;
            });
        });
    </script>
</body>
</html>
